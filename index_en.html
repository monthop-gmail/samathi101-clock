function doSamathi(divname, min, me) {
  if(me.textContent == "เริ่ม") {
    startSamathi(divname, min, me);
  } else {
    cancelSamathi(divname, me);
  }
}

function startSamathi(divname, min, me) {
  if(intervals["play"]) {
    return;
  }
  if(intervals[divname]) {
    return;
  }
  
  // Set the date we're counting down to
  var Distance = 1000 * 60 * min + 2000;
  var countDownDate = new Date().getTime() + Distance;
  sound_play();
  noSleep.enable();
  intervals["play"] = divname;
  me.textContent = "ยกเลิก";
  ol_open();
  
  // Update the count down every 1 second
  intervals[divname] = setInterval(function() {

    // Get today's date and time
    var now = new Date().getTime();

    // Find the distance between now and the count down date
    var distance = countDownDate - now;

    // Time calculations for days, hours, minutes and seconds
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    // Display the result in the element with id="demo"
    document.getElementById(divname).innerHTML = minutes + "m " + seconds + "s ";
    document.getElementById(divname).classList.add("w3-red");
    document.getElementById(divname).classList.remove("w3-aqua");
    
    // doWarn
    if( (document.getElementById('idWarn').textContent == "เตือนหลับ") && ((Distance-distance) > 5000) && (distance > 5000) && (((minutes*60+seconds) % (5*60)) == 0) ) {
      warnSound.play();
    }
    
    // If the count down is finished, write some text 
    if (distance < 0) {
      endSamathi(divname, me);
    }
  }, 1000);
}

function cancelSamathi(divname, me) {
  if(intervals[divname] !== 'undefined' && intervals[divname]) {
    var x = "";
    if(divname == 'Samathi5min') x="5";
    if(divname == 'SamathiWalk30min') x="30";
    if(divname == 'SamathiSit30min') x="30";
    if(divname == 'Samathi15min') x="15";
    clearInterval(intervals[divname]);
    intervals[divname] = null;
    document.getElementById(divname).innerHTML = x + "นาที";
    document.getElementById(divname).classList.remove("w3-red");
    document.getElementById(divname).classList.add("w3-aqua");
    sound_play();
    noSleep.disable();
    intervals["play"] = null;
    me.textContent = "เริ่ม";
    ol_close();
  }
}

function endSamathi(divname, me) {
  if(intervals[divname] !== 'undefined' && intervals[divname]) {
    clearInterval(intervals[divname]);
    intervals[divname] = null;
    document.getElementById(divname).innerHTML = "จบ";
    document.getElementById(divname).classList.remove("w3-red");
    document.getElementById(divname).classList.add("w3-aqua");
    sound_play();
    noSleep.disable();
    intervals["play"] = null;
    me.textContent = "เริ่ม";
    ol_close();
  }
}

function doClock() {
  var top = document.getElementById("div-left").offsetTop;
  var size = document.getElementById("div-left").offsetWidth;
  if(window.innerWidth>600) {
    var h = Math.floor(window.innerHeight);
    var l = h - top;
    if( size > l ) size = l;
  }
  //setup_version(size+top);

  canvas.setAttribute("width", size);
  canvas.setAttribute("height", size);

  ctx = canvas.getContext("2d");
  radius = canvas.height / 2;
  ctx.translate(radius, radius);
  radius = radius * 0.90;
  
  if(intervals["clock"]) {
    clearInterval(intervals["clock"]);
  }
  intervals["clock"] = setInterval(drawClock, 1000);
}

function drawClock() {
  drawFace(ctx, radius);
  drawNumbers(ctx, radius);
  drawTime(ctx, radius);
}

function drawFace(ctx, radius) {
  var grad;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, 2*Math.PI);
  ctx.fillStyle = 'white';
  ctx.fill();
  grad = ctx.createRadialGradient(0,0,radius*0.95, 0,0,radius*1.05);
  grad.addColorStop(0, '#333');
  grad.addColorStop(0.5, 'white');
  grad.addColorStop(1, '#333');
  ctx.strokeStyle = grad;
  ctx.lineWidth = radius*0.1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, radius*0.1, 0, 2*Math.PI);
  ctx.fillStyle = '#333';
  ctx.fill();
}

function drawNumbers(ctx, radius) {
  var ang;
  var num;
  ctx.font = radius*0.15 + "px arial";
  ctx.textBaseline="middle";
  ctx.textAlign="center";
  for(num = 1; num < 13; num++){
    ang = num * Math.PI / 6;
    ctx.rotate(ang);
    ctx.translate(0, -radius*0.85);
    ctx.rotate(-ang);
    ctx.fillText(num.toString(), 0, 0);
    ctx.rotate(ang);
    ctx.translate(0, radius*0.85);
    ctx.rotate(-ang);
  }
}

function drawTime(ctx, radius){
  var now = new Date();
  var hour = now.getHours();
  var minute = now.getMinutes();
  var second = now.getSeconds();
  //hour
  hour=hour%12;
  hour=(hour*Math.PI/6)+
  (minute*Math.PI/(6*60))+
  (second*Math.PI/(360*60));
  drawHand(ctx, hour, radius*0.5, radius*0.07);
  //minute
  minute=(minute*Math.PI/30)+(second*Math.PI/(30*60));
  drawHand(ctx, minute, radius*0.8, radius*0.07);
  // second
  second=(second*Math.PI/30);
  drawHand(ctx, second, radius*0.9, radius*0.02);
}

function drawHand(ctx, pos, length, width) {
  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.lineCap = "round";
  ctx.moveTo(0,0);
  ctx.rotate(pos);
  ctx.lineTo(0, -length);
  ctx.stroke();
  ctx.rotate(-pos);
}

function sound(src) {
  this.sound = document.createElement("audio");
  this.sound.src = src;
  this.sound.setAttribute("preload", "auto");
  this.sound.setAttribute("controls", "none");
  this.sound.style.display = "none";
  //this.sound.volume = 0.2;
  document.body.appendChild(this.sound);
  this.play = function(){
    this.sound.play();
  }
  this.stop = function(){
    this.sound.pause();
  }    
}

function sound_play() {
  bellSound.play();
}
